name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env to Hostinger
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ~/public_html &&
            echo 'NODE_ENV=${{ secrets.NODE_ENV }}' > ~/public_html/.env &&
            echo 'MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}' >> ~/public_html/.env &&
            echo 'AGENT_ID=${{ secrets.AGENT_ID }}' >> ~/public_html/.env &&
            echo 'APP_URL=${{ secrets.APP_URL }}' >> ~/public_html/.env
          "